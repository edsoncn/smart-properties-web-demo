<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Smart Shop - Account</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="/css/styles.css" rel="stylesheet" />
</head>
<body>
<div th:replace="index.html :: navbar"></div>
<!-- Header-->
<header class="bg-dark py-1">
    <div class="container px-3 px-lg-3 my-3">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">My Account</h1>
        </div>
    </div>
</header>
<!-- Section-->
<section class="py-5">
    <div id="page-wrapper" class="container px-3 px-lg-3 mt-3">
        <div class="row">
            <div class="col-md-4 mb-5">
                <div class="card">
                    <div class="card-header"><strong>Menu Options</strong></div>
                    <div class="list-group list-group-flush">
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'login')}">Login</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'register')}">Register</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'account')}">My Account</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'represent')}">Represent User</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'address')}">My Address</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'history')}">My Orders</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'tracking')}">Order Tracking</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'credit')}">My Credits</a>
                        <a class="list-group-item list-group-item-action" th:if="${#strings.contains(options, 'password')}">Password</a>
                    </div>
                </div>
            </div>
            <div class="col-md-8 mb-5">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${message}"></h5>
                        <h6 class="card-subtitle mb-2 text-muted">My personal data</h6>
                        <div class="row">
                            <label for="name" class="col-sm-3 col-form-label">Name</label>
                            <div class="col-sm-9">
                                <input type="text" readonly class="form-control-plaintext" id="name" th:value="${name}">
                            </div>
                        </div>
                        <div class="row">
                            <label for="email" class="col-sm-3 col-form-label">Email</label>
                            <div class="col-sm-9">
                                <input type="text" readonly class="form-control-plaintext" id="email" value="myemail@mail.com">
                            </div>
                        </div>
                        <div class="row">
                            <label for="birth" class="col-sm-3 col-form-label">Date of birth</label>
                            <div class="col-sm-9">
                                <input type="text" readonly class="form-control-plaintext" id="birth" value="02/08/1990">
                            </div>
                        </div>
                        <div class="row">
                            <label for="phone" class="col-sm-3 col-form-label">Phone</label>
                            <div class="col-sm-9">
                                <input type="text" readonly class="form-control-plaintext" id="phone" value="+51999666333">
                            </div>
                        </div>
                    </div>
                </div>
                <form action="/variables" method="post" class="mt-3" id="form-variables">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Update Variables</h5>
                            <div class="row">
                                <label for="name" class="col-sm-3 col-form-label">Name</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="name" th:value="${name}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="rol" class="col-sm-3 col-form-label">Rol</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="rol" th:value="${rol}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="orderNumber" class="col-sm-3 col-form-label">Order Number</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="orderNumber" th:value="${orderNumber}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="status" class="col-sm-3 col-form-label">Order Status</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="status" th:value="${status}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="totalAmount" class="col-sm-3 col-form-label">Order Total Amount</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="totalAmount" th:value="${totalAmount}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="paymentMethod" class="col-sm-3 col-form-label">Order Payment Method</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="paymentMethod" th:value="${paymentMethod}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="lastCouponWinDays" class="col-sm-3 col-form-label">Last Cupon Win Days</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="lastCouponWinDays" th:value="${lastCouponWinDays}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="day" class="col-sm-3 col-form-label">Day</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="day" th:value="${day}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="month" class="col-sm-3 col-form-label">Month</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="month" th:value="${month}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="dayBirth" class="col-sm-3 col-form-label">Day Birth</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="dayBirth" th:value="${dayBirth}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="monthBirth" class="col-sm-3 col-form-label">Month Birth</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="monthBirth" th:value="${monthBirth}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="hasHistoricalOrders" class="col-sm-3 col-form-label">Has Historical Orders?</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="hasHistoricalOrders" th:value="${hasHistoricalOrders}">
                                </div>
                            </div>
                            <div class="row">
                                <label for="creditClient" class="col-sm-3 col-form-label">Credit Client</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control-plaintext" name="creditClient" th:value="${creditClient}">
                                </div>
                            </div>
                            <div class="row">
                                <button onclick="updateVariable()" type="button">Submit</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<div th:replace="index.html :: footer"></div>
<!-- Bootstrap core JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<!-- Core theme JS-->
<script src="/js/scripts.js"></script>
</body>
</html>
</body>
</html>
